<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>RTY MOTOPARPS · Mobile Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- Mobile Header -->
        <header class="mobile-header">
            <div class="header-left">
                <div class="logo">RTY</div>
            </div>
            <div class="header-center">
                <span class="header-title">MOTOPARPS</span>
            </div>
            <div class="header-right">
                <button onclick="logout()" class="btn-icon" title="Sign out">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                </button>
            </div>
        </header>

        <!-- User Info Bar -->
        <div class="user-bar">
            <div class="user-avatar" id="userAvatar"></div>
            <div class="user-details">
                <span class="user-name" id="displayName"></span>
                <span class="user-role">Administrator</span>
            </div>
            <div class="sync-status" id="syncStatus">📡 Live</div>
        </div>

        <!-- Main Content -->
        <main class="main">
            <!-- Quick Actions -->
            <div class="quick-actions">
                <button onclick="showAddModal()" class="quick-action-btn primary">
                    <span class="quick-icon">+</span>
                    <span class="quick-label">Add Part</span>
                </button>
                <button onclick="exportInventory()" class="quick-action-btn secondary">
                    <span class="quick-icon">📤</span>
                    <span class="quick-label">Export</span>
                </button>
            </div>

            <!-- Date -->
            <div class="date-badge" id="inventoryDate"></div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state">
                <div class="empty-icon">🏍️</div>
                <h3>No Parts Yet</h3>
                <p>Tap the + button to add your first motorcycle part</p>
            </div>

            <!-- Dashboard Content -->
            <div id="dashboardContent" style="display: none;">
                <!-- Stats Cards -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <span class="stat-value" id="totalParts">0</span>
                        <span class="stat-label">Total Parts</span>
                    </div>
                    <div class="stat-card warning">
                        <span class="stat-value" id="lowStockCount">0</span>
                        <span class="stat-label">Low Stock</span>
                    </div>
                    <div class="stat-card">
                        <span class="stat-value" id="totalValue">₱0</span>
                        <span class="stat-label">Total Value</span>
                    </div>
                </div>

                <!-- Search Bar -->
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="🔍 Search parts or models..." onkeyup="filterInventory()">
                    <select id="categoryFilter" class="category-filter" onchange="filterInventory()">
                        <option value="">All Categories</option>
                        <option value="Engine">Engine</option>
                        <option value="Brakes">Brakes</option>
                        <option value="Suspension">Suspension</option>
                        <option value="Wheels">Wheels</option>
                        <option value="Electrical">Electrical</option>
                        <option value="Body">Body</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Transmission">Transmission</option>
                    </select>
                </div>

                <!-- Low Stock Alert -->
                <div id="lowStockBanner" class="alert-banner" style="display: none;">
                    <span class="alert-icon">⚠️</span>
                    <span id="lowStockMessage"></span>
                </div>

                <!-- Mobile Card List -->
                <div class="parts-list" id="inventoryCards"></div>
            </div>
        </main>

        <!-- Mobile Bottom Nav -->
        <nav class="bottom-nav">
            <button class="nav-item active" onclick="window.location.reload()">
                <span class="nav-icon">📋</span>
                <span class="nav-label">Parts</span>
            </button>
            <button class="nav-item" onclick="showAddModal()">
                <span class="nav-icon">➕</span>
                <span class="nav-label">Add</span>
            </button>
            <button class="nav-item" onclick="exportInventory()">
                <span class="nav-icon">📤</span>
                <span class="nav-label">Export</span>
            </button>
        </nav>
    </div>

    <!-- Add/Edit Modal (Mobile Optimized) -->
    <div id="itemModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Part</h2>
                <button onclick="closeModal()" class="modal-close">✕</button>
            </div>
            
            <form id="itemForm" onsubmit="saveItem(event)">
                <input type="hidden" id="itemId">
                
                <div class="form-group">
                    <label>Part Name <span class="required">*</span></label>
                    <input type="text" id="partName" required placeholder="e.g., Brake Pad Set">
                </div>
                
                <div class="form-group">
                    <label>Category <span class="required">*</span></label>
                    <select id="category" required>
                        <option value="">Select Category</option>
                        <option value="Engine">Engine Parts</option>
                        <option value="Brakes">Brake System</option>
                        <option value="Suspension">Suspension</option>
                        <option value="Wheels">Wheels & Tires</option>
                        <option value="Electrical">Electrical</option>
                        <option value="Body">Body Parts</option>
                        <option value="Accessories">Accessories</option>
                        <option value="Transmission">Transmission</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Compatible Models</label>
                    <input type="text" id="compatibleModels" placeholder="e.g., Honda Click, Yamaha Mio">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Quantity <span class="required">*</span></label>
                        <input type="number" id="quantity" required min="0" value="0">
                    </div>
                    
                    <div class="form-group">
                        <label>Price (₱) <span class="required">*</span></label>
                        <input type="number" id="price" required min="0" step="0.01" value="0.00">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label>Min Stock</label>
                        <input type="number" id="minStock" min="0" value="5">
                    </div>
                    
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" id="location" placeholder="Aisle-Rack">
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Supplier</label>
                    <input type="text" id="supplier" placeholder="Supplier name">
                </div>
                
                <div class="form-group">
                    <label>OEM Number</label>
                    <input type="text" id="oemNumber" placeholder="Original part number">
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn-primary">Save Part</button>
                    <button type="button" onclick="closeModal()" class="btn-secondary">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Stock Adjustment Modal (Mobile Optimized) -->
    <div id="stockModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Adjust Stock</h2>
                <button onclick="closeStockModal()" class="modal-close">✕</button>
            </div>
            
            <div class="stock-info" id="stockItemInfo"></div>
            
            <div class="stock-display">
                <span class="stock-label">Current:</span>
                <span class="stock-value" id="currentStockDisplay">0</span>
            </div>
            
            <div class="stock-controls">
                <div class="stock-row">
                    <button onclick="quickAdjust('subtract', 1)" class="stock-btn">−1</button>
                    <button onclick="quickAdjust('subtract', 5)" class="stock-btn">−5</button>
                    <button onclick="quickAdjust('subtract', 10)" class="stock-btn">−10</button>
                </div>
                
                <div class="stock-row">
                    <input type="number" id="customAdjustment" placeholder="Custom amount">
                    <button onclick="applyCustomAdjustment()" class="btn-primary">Apply</button>
                </div>
                
                <div class="stock-row">
                    <button onclick="quickAdjust('add', 1)" class="stock-btn">+1</button>
                    <button onclick="quickAdjust('add', 5)" class="stock-btn">+5</button>
                    <button onclick="quickAdjust('add', 10)" class="stock-btn">+10</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Confirm</h2>
                <button onclick="closeConfirmModal()" class="modal-close">✕</button>
            </div>
            
            <div class="confirm-content">
                <p id="confirmMessage"></p>
            </div>
            
            <div class="confirm-actions">
                <button onclick="executeDelete()" class="btn-danger">Delete</button>
                <button onclick="closeConfirmModal()" class="btn-secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
