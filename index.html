<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>RTY MOTOPARPS · Mobile Inventory</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="auth-container">
            <div class="auth-brand">
                <div class="brand-icon">🏍️</div>
                <h1 class="brand-name">RTY<span>MOTOPARPS</span></h1>
                <p class="brand-tagline">Mobile Inventory System</p>
            </div>
            
            <div class="auth-card">
                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <label for="username">Username</label>
                        <input type="text" id="username" placeholder="Enter username" autocomplete="off" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" placeholder="Enter password" required>
                    </div>
                    
                    <div id="loginError" class="error-message"></div>
                    
                    <button type="submit" class="btn-primary btn-full">Sign In</button>
                </form>
                
                <div class="auth-footer">
                    <p>RTY MOTORPARPS © 2024</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Single admin account
        const ADMIN_USERNAME = 'admin';
        const ADMIN_PASSWORD = 'rtysalamat';

        function handleLogin(event) {
            event.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorElement = document.getElementById('loginError');

            if (username === ADMIN_USERNAME && password === ADMIN_PASSWORD) {
                localStorage.setItem('rtyCurrentUser', JSON.stringify({
                    username: username,
                    name: 'Administrator',
                    role: 'admin',
                    loginTime: new Date().toISOString()
                }));
                
                window.location.href = 'dashboard.html';
            } else {
                errorElement.textContent = 'Invalid credentials';
            }
        }

        if (localStorage.getItem('rtyCurrentUser')) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
